name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop, 'feature/**' ]

  pull_request:
    branches: [ main, master, develop ]

  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to deploy (develop/master)'
        required: true
        default: 'master'

jobs:

  test:
    name: Test
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug Input
        run: |
          echo "event=${{ github.event_name }}"
          echo "github.ref=${{ github.ref }}"
          echo "input.ref=${{ github.event.inputs.ref }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=lcov text

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 1

  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: SonarQube Scan
        run: |
          docker run --rm \
            --network devops-testing-net \
            -e SONAR_HOST_URL=${{ secrets.SONAR_HOST_URL }} \
            -e SONAR_TOKEN=${{ secrets.SONAR_TOKEN }} \
            -v "$PWD:/usr/src" \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.projectKey=devops-test-app \
            -Dsonar.sources=. \
            -Dsonar.exclusions=node_modules/**,coverage/** \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
            -Dsonar.scm.revision=${{ github.sha }}

  deploy-staging:
    name: Deploy → Staging
    runs-on: self-hosted
    needs: [test, sonarqube]

    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.ref == 'develop'

    environment:
      name: staging
      url: http://localhost:8081

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging..."
          docker cp app/. devops_staging:/usr/share/nginx/html/
          docker exec devops_staging nginx -s reload

      - name: Verify Staging
        run: |
          sleep 2
          curl -f --retry 3 http://devops_staging:80 -o /dev/null -s

  deploy-production:
    name: Deploy → Production
    runs-on: self-hosted
    needs: [test, sonarqube]

    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.ref == 'master'

    environment:
      name: production
      url: http://localhost:8082

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          docker cp app/. devops_prod:/usr/share/nginx/html/
          docker exec devops_prod sed -i 's/>staging</>production</g' /usr/share/nginx/html/index.html
          docker exec devops_prod nginx -s reload

      - name: Verify Production
        run: |
          sleep 2
          curl -f --retry 3 http://devops_prod:80 -o /dev/null -s