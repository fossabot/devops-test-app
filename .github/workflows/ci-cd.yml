name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop, 'feature/**' ]

  pull_request:
    branches: [ master, develop ]

  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to deploy (develop/master)'
        required: true
        default: 'develop'

jobs:

  test:
    name: Test
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm test -- --coverage --coverageReporters=lcov text

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/


  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - run: |
          docker run --rm \
            --network devops-testing-net \
            -e SONAR_HOST_URL=http://devops_sonarqube:9000 \
            -e SONAR_TOKEN=${{ secrets.SONAR_TOKEN }} \
            -v "$PWD:/usr/src" \
            sonarsource/sonar-scanner-cli:6 \
            -Dsonar.projectKey=devops-test-app \
            -Dsonar.sources=. \
            -Dsonar.exclusions=node_modules/**,coverage/** \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
            -Dsonar.scm.revision=${{ github.sha }}


  deploy-staging:
    name: Deploy → Staging
    runs-on: self-hosted
    needs: [test, sonarqube]

    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.ref == 'develop')
      || github.ref == 'refs/heads/develop'

    environment:
      name: staging
      url: http://localhost:8081

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging..."
          docker cp app/. devops_staging:/usr/share/nginx/html/
          docker exec devops_staging nginx -s reload


  deploy-production:
    name: Deploy → Production
    runs-on: self-hosted
    needs: [test, sonarqube]

    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.ref == 'master')
      || github.ref == 'refs/heads/master'

    environment:
      name: production
      url: http://localhost:8082

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          docker cp app/. devops_prod:/usr/share/nginx/html/
          docker exec devops_prod sed -i 's/>staging</>production</g' /usr/share/nginx/html/index.html
          docker exec devops_prod nginx -s reload