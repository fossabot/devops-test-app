name: Deploy → Production

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node node_modules/jest/bin/jest.js --coverage --coverageReporters=lcov text
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-production
          path: coverage/

  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-production
          path: coverage/

      - name: Debug - List repository files
        run: |
          echo "=== Current Directory ==="
          pwd
          echo "=== Repository Files ==="
          find . -type f | head -100

      - name: SonarQube Scan
        run: |
          docker run --rm \
            --network devops-testing-net \
            -e SONAR_HOST_URL=http://sonarqube:9000 \
            -e SONAR_TOKEN=${{ secrets.SONAR_TOKEN }} \
            -v "$PWD:/usr/src" \
            sonarsource/sonar-scanner-cli:5.0.1 \
            -Dsonar.projectKey=devops-test-app-master \
            -Dsonar.projectBaseDir=/usr/src \
            -Dsonar.sources=/usr/src \
            -Dsonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/** \
            -Dsonar.javascript.lcov.reportPaths=/usr/src/coverage/lcov.info \
            -Dsonar.scm.revision=${{ github.sha }}

  deploy:
    name: Deploy → Production
    runs-on: self-hosted
    needs: [test, sonarqube]
    environment:
      name: production
      url: http://localhost:8082
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          docker cp app/. devops_prod:/usr/share/nginx/html/
          docker exec devops_prod sed -i 's/>staging</>production</g' /usr/share/nginx/html/index.html
          docker exec devops_prod nginx -s reload
