name: Deploy → Production

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: chmod +x node_modules/.bin/jest || true
      - run: npm test -- --coverage --coverageReporters=lcov text
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-production
          path: coverage/
      - name: Upload test results to Redmine
        if: always()
        env:
          REDMINE_URL: ${{ secrets.REDMINE_URL }}
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
          REDMINE_PROJECT: ${{ secrets.REDMINE_PROJECT }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          BUILD_ID: ${{ github.run_id }}:${{ github.run_attempt }}
        run: |
          if [ -d "test-results" ]; then
            for file in test-results/*.xml; do
              echo "Uploading $file to Redmine... (build=$BUILD_ID)"
              XML_BASE64=$(base64 -w 0 "$file")
              JSON_BODY="{\"build_external_id\":\"$BUILD_ID\",\"junit_xml_base64\":\"$XML_BASE64\"}"
              SIGNATURE=$(echo -n "$JSON_BODY" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')
              curl -s -X POST \
                -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
                -H "Content-Type: application/json" \
                -d "$JSON_BODY" \
                "$REDMINE_URL/devops/webhook/github/$REDMINE_PROJECT/test_results"
            done
          fi

  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-production
          path: coverage/

      - name: Debug - List repository files
        run: |
          echo "=== Current Directory ==="
          pwd
          echo "=== Repository Files ==="
          find . -type f | head -100

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_HOST_URL: http://sonarqube:9000
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=devops-test-app-master
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/*.java
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.scm.revision=${{ github.sha }}

  deploy:
    name: Deploy → Production
    runs-on: self-hosted
    needs: [test, sonarqube]
    environment:
      name: production
      url: http://localhost:8082
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          docker cp app/. devops_prod:/usr/share/nginx/html/
          docker exec devops_prod sed -i 's/>staging</>production</g' /usr/share/nginx/html/index.html
          docker exec devops_prod nginx -s reload

      - name: Notify Redmine — deployment success
        if: success()
        env:
          WEBHOOK_SECRET: ${{ secrets.REDMINE_WEBHOOK_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          if [ -z "${WEBHOOK_SECRET}" ]; then
            echo "REDMINE_WEBHOOK_SECRET not configured - skipping"
            exit 0
          fi
          DEPLOY_ID=$(curl -s -H "Authorization: token ${GH_TOKEN}" "https://api.github.com/repos/${REPO}/deployments?sha=${COMMIT_SHA}&environment=production&per_page=1" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if d else 0)")
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          PAYLOAD=$(jq -cn --argjson id "${DEPLOY_ID}" --arg sha "${COMMIT_SHA}" --arg ref "${REF_NAME}" --arg actor "${ACTOR}" --arg url "${RUN_URL}" '{"deployment":{"id":$id,"sha":$sha,"ref":$ref,"environment":"production","description":"Deployed via GitHub Actions","creator":{"login":$actor}},"deployment_status":{"state":"success","target_url":$url,"environment_url":"http://localhost:8082"},"sender":{"login":$actor}}')
          SIG="sha256=$(echo -n "${PAYLOAD}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST -H "Content-Type: application/json" -H "X-GitHub-Event: deployment_status" -H "X-Hub-Signature-256: ${SIG}" -H "X-GitHub-Delivery: direct-${RUN_ID}-${RUN_ATTEMPT}" -d "${PAYLOAD}" http://host.docker.internal:3006/devops/webhook/github/test-project) || true
          echo "Redmine notified: HTTP ${HTTP_STATUS}"
