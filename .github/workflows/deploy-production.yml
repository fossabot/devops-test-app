name: Deploy → Production

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node node_modules/jest/bin/jest.js --coverage --coverageReporters=lcov text
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-production
          path: coverage/
      - name: Upload test results to Redmine
        if: always()
        env:
          REDMINE_URL: ${{ secrets.REDMINE_URL }}
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
          REDMINE_PROJECT: ${{ secrets.REDMINE_PROJECT }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          if [ -d "test-results" ]; then
            for file in test-results/*.xml; do
              echo "Uploading $file to Redmine..."
              SIGNATURE=$(openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" "$file" | sed 's/^.* //')
              curl -s -X POST \
                -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
                -H "X-Redmine-API-Key: $REDMINE_API_KEY" \
                --data-binary @"$file" \
                -H "Content-Type: application/xml" \
                "$REDMINE_URL/devops/webhook/github/$REDMINE_PROJECT/test_results"
            done
          fi

  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-production
          path: coverage/

      - name: Debug - List repository files
        run: |
          echo "=== Current Directory ==="
          pwd
          echo "=== Repository Files ==="
          find . -type f | head -100

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_HOST_URL: http://sonarqube:9000
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=devops-test-app-master
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/*.java
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.scm.revision=${{ github.sha }}

  deploy:
    name: Deploy → Production
    runs-on: self-hosted
    needs: [test, sonarqube]
    environment:
      name: production
      url: http://localhost:8082
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          docker cp app/. devops_prod:/usr/share/nginx/html/
          docker exec devops_prod sed -i 's/>staging</>production</g' /usr/share/nginx/html/index.html
          docker exec devops_prod nginx -s reload
