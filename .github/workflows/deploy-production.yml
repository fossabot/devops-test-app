name: Deploy → Production

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node node_modules/jest/bin/jest.js --coverage --coverageReporters=lcov text
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-production
          path: coverage/

  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-production
          path: coverage/
      - name: Debug - List files
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== Root JS files ==="
          ls -la *.js *.py *.json 2>/dev/null || echo "No files at root"
          echo "=== All JS/PY files ==="
          find . -name "*.js" -not -path "*/node_modules/*" | head -20
          find . -name "*.py" | head -10
      - run: |
          docker run --rm \
            --network devops-testing-net \
            -e SONAR_HOST_URL=http://sonarqube:9000 \
            -e SONAR_TOKEN=${{ secrets.SONAR_TOKEN }} \
            -v "$PWD:/usr/src" \
            sonarsource/sonar-scanner-cli:11.1 \
            -Dsonar.projectKey=devops-test-app-master \
            -Dsonar.projectBaseDir=/usr/src \
            -Dsonar.sources=/usr/src \
            -Dsonar.exclusions=/usr/src/node_modules/**,/usr/src/coverage/**,/usr/src/dist/** \
            -Dsonar.javascript.lcov.reportPaths=/usr/src/coverage/lcov.info \
            -Dsonar.scm.revision=${{ github.sha }}

  deploy:
    name: Deploy → Production
    runs-on: self-hosted
    needs: [test, sonarqube]
    environment:
      name: production
      url: http://localhost:8082
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          docker cp app/. devops_prod:/usr/share/nginx/html/
          docker exec devops_prod sed -i 's/>staging</>production</g' /usr/share/nginx/html/index.html
          docker exec devops_prod nginx -s reload
