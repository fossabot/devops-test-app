name: Deploy → Staging

on:
  workflow_dispatch:
  push:
    branches: [ develop ]

jobs:

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm test -- --coverage --coverageReporters=lcov text

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-staging
          path: coverage/

  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: coverage-staging
          path: coverage/

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_HOST_URL: http://sonarqube:9000
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=devops-test-app-master
            -Dsonar.sources=.
            -Dsonar.inclusions=**/*.js,**/*.py
            -Dsonar.exclusions=node_modules/**,coverage/**,dist/**,**/*.java
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  deploy:
    name: Deploy → Staging
    runs-on: self-hosted
    needs: [test, sonarqube]

    environment:
      name: staging
      url: http://localhost:8081

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging..."
          docker cp app/. devops_staging:/usr/share/nginx/html/
          docker exec devops_staging nginx -s reload
