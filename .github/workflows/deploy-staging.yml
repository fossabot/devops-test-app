name: Deploy → Staging

on:
  workflow_dispatch:
  push:
    branches: [ develop ]

jobs:

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm test -- --coverage --coverageReporters=lcov text

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-staging
          path: coverage/

  deploy:
    name: Deploy → Staging
    runs-on: self-hosted
    needs: test

    environment:
      name: staging
      url: http://localhost:8081

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging..."
          docker cp app/. devops_staging:/usr/share/nginx/html/
          docker exec devops_staging nginx -s reload

      - name: Notify Redmine — deployment success
        if: success()
        env:
          WEBHOOK_SECRET: ${{ secrets.REDMINE_WEBHOOK_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          if [ -z "${WEBHOOK_SECRET}" ]; then
            echo "REDMINE_WEBHOOK_SECRET not configured — skipping notification"
            exit 0
          fi

          # Get GitHub deployment ID created for this commit + environment
          DEPLOY_ID=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/deployments?sha=${COMMIT_SHA}&environment=staging&per_page=1" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if d else 0)")

          # Build deployment_status payload using Python for correct JSON encoding
          PAYLOAD=$(DEPLOY_ID="${DEPLOY_ID}" python3 -c "
import json, os
print(json.dumps({
    'deployment': {
        'id': int(os.environ.get('DEPLOY_ID', 0)),
        'sha': os.environ['COMMIT_SHA'],
        'ref': os.environ['REF_NAME'],
        'environment': 'staging',
        'description': 'Deployed via GitHub Actions',
        'creator': {'login': os.environ['ACTOR']}
    },
    'deployment_status': {
        'state': 'success',
        'target_url': 'https://github.com/' + os.environ['REPO'] + '/actions/runs/' + os.environ['RUN_ID'],
        'environment_url': 'http://localhost:8081'
    },
    'sender': {'login': os.environ['ACTOR']}
}))
")

          # HMAC-SHA256 sign the payload with the Redmine webhook secret
          SIG="sha256=$(echo -n "${PAYLOAD}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')"

          # POST directly to Redmine via host.docker.internal — bypasses ngrok entirely
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: deployment_status" \
            -H "X-Hub-Signature-256: ${SIG}" \
            -H "X-GitHub-Delivery: direct-${RUN_ID}-${RUN_ATTEMPT}" \
            -d "${PAYLOAD}" \
            http://host.docker.internal:3006/devops/webhook/github/test-project) || true
          echo "Redmine notified: HTTP ${HTTP_STATUS}"
