name: Deploy → Staging

on:
  workflow_dispatch:
  push:
    branches: [ develop ]

jobs:

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: chmod +x node_modules/.bin/jest || true

      - run: npm test -- --coverage --coverageReporters=lcov text

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-staging
          path: coverage/

  deploy:
    name: Deploy → Staging
    runs-on: self-hosted
    needs: test

    environment:
      name: staging
      url: http://localhost:8081

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging..."
          docker cp app/. devops_staging:/usr/share/nginx/html/
          docker exec devops_staging nginx -s reload

      - name: Notify Redmine — deployment success
        if: success()
        env:
          WEBHOOK_SECRET: ${{ secrets.REDMINE_WEBHOOK_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          if [ -z "${WEBHOOK_SECRET}" ]; then
            echo "REDMINE_WEBHOOK_SECRET not configured - skipping"
            exit 0
          fi
          DEPLOY_ID=$(curl -s -H "Authorization: token ${GH_TOKEN}" "https://api.github.com/repos/${REPO}/deployments?sha=${COMMIT_SHA}&environment=staging&per_page=1" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if d else 0)")
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          PAYLOAD=$(jq -cn --argjson id "${DEPLOY_ID}" --arg sha "${COMMIT_SHA}" --arg ref "${REF_NAME}" --arg actor "${ACTOR}" --arg url "${RUN_URL}" '{"deployment":{"id":$id,"sha":$sha,"ref":$ref,"environment":"staging","description":"Deployed via GitHub Actions","creator":{"login":$actor}},"deployment_status":{"state":"success","target_url":$url,"environment_url":"http://localhost:8081"},"sender":{"login":$actor}}')
          SIG="sha256=$(echo -n "${PAYLOAD}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $NF}')"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST -H "Content-Type: application/json" -H "X-GitHub-Event: deployment_status" -H "X-Hub-Signature-256: ${SIG}" -H "X-GitHub-Delivery: direct-${RUN_ID}-${RUN_ATTEMPT}" -d "${PAYLOAD}" http://host.docker.internal:3006/devops/webhook/github/test-project) || true
          echo "Redmine notified: HTTP ${HTTP_STATUS}"
