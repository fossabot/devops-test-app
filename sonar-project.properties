# Project Information
sonar.projectKey=devops-test-app
sonar.projectName=devops test app
sonar.projectVersion=1.0
 
# Source Code
sonar.sources=.
sonar.inclusions=**/*.js
sonar.exclusions=node_modules/**,coverage/**,dist/**
 
# Test Files
sonar.tests=.
sonar.test.inclusions=**/*.test.js
 
# Coverage Report
sonar.javascript.lcov.reportPaths=coverage/lcov.info
 
# Source Encoding
sonar.sourceEncoding=UTF-8
